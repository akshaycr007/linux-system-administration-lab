server {
    listen 80;
    server_name pddtestapp.luluone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pddtestapp.luluone.com;

    ssl_certificate /etc/ssl/pddtestapp/pddtestapp.crt;
    ssl_certificate_key /etc/ssl/pddtestapp/pddtestapp.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}





Line-by-Line Explanation & Definitions
🔒 Block 1: Unencrypted HTTP Traffic Redirection (Port 80)
Nginx
server {
    listen 80;
    server_name pddtestapp.luluone.com;
    return 301 https://$host$request_uri;
}
server { ... }: Defines a virtual host block in Nginx that inspects and handles incoming requests matching specific network criteria.

listen 80;: Configures Nginx to listen for incoming connections on TCP port 80 (the default port for unencrypted HTTP web traffic).

server_name pddtestapp.luluone.com;: Specifies the domain name that triggers this server block. If a request arrives with this domain in its HTTP header, Nginx applies these rules.

return 301 https://$host$request_uri;: Immediately forces an HTTP-to-HTTPS redirect:

301: HTTP status code for "Moved Permanently," instructing browsers and web clients to always use HTTPS in future requests.

$host: Nginx variable representing the requested domain name (pddtestapp.luluone.com).

$request_uri: Preserves the original path and parameters requested by the user (e.g., /index.html or /about).

🛡️ Block 2: Encrypted HTTPS Server & SSL Termination (Port 443)
Nginx
server {
    listen 443 ssl;
    server_name pddtestapp.luluone.com;
listen 443 ssl;: Configures Nginx to listen on TCP port 443 (the standard port for HTTPS) and enables TLS/SSL encryption for all connections on this port.

server_name pddtestapp.luluone.com;: Binds encrypted requests for pddtestapp.luluone.com to this specific configuration block.

Nginx
    ssl_certificate /etc/ssl/pddtestapp/pddtestapp.crt;
    ssl_certificate_key /etc/ssl/pddtestapp/pddtestapp.key;
ssl_certificate: Points to the public cryptographic certificate file (.crt) generated by OpenSSL. This is presented to client browsers so they can establish an encrypted TLS connection.

ssl_certificate_key: Points to the private key file (.key) used by Nginx on servera to decrypt data sent by clients.

Nginx
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
ssl_protocols TLSv1.2 TLSv1.3;: Restricts connection protocols strictly to secure, modern versions (TLS 1.2 and TLS 1.3), explicitly disabling deprecated, vulnerable protocols (SSLv2, SSLv3, TLS 1.0, and TLS 1.1).

ssl_ciphers HIGH:!aNULL:!MD5;: Enforces strong cryptographic algorithms:

HIGH: Uses strong cipher suites (e.g., AES-128, AES-256).

!aNULL: Disables unauthenticated cipher suites to prevent man-in-the-middle attacks.

!MD5: Disables outdated MD5 hashing algorithms.

🔀 Block 3: Reverse Proxy Location Block
Nginx
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
location / { ... }: Intercepts all incoming requests matching the root URL path (/) and any sub-paths.

proxy_pass [http://127.0.0.1:8082](http://127.0.0.1:8082);: Core reverse proxy directive. Instructs Nginx to take the incoming HTTPS request and forward (proxy) it internally to the local Nginx Docker container (my-app1) running on [http://127.0.0.1:8082](http://127.0.0.1:8082).

proxy_set_header Directives: Keeps essential request details intact so the backend container knows who sent the original request:

Host $host: Passes the original domain name requested by the user.

X-Real-IP $remote_addr: Forwards the actual client IP address instead of Nginx's loopback IP (127.0.0.1).

X-Forwarded-For $proxy_add_x_forwarded_for: Appends client IP information to track request chains through proxy layers.

X-Forwarded-Proto $scheme: Informs the backend container whether the original request was http or https.
