[defaults]
inventory = ./hosts
host_key_checking = False



[defaults] ➡️ Section header applying default behaviors to all Ansible runs within this directory.

inventory = ./hosts ➡️ Automatically loads the local ./hosts file, removing the requirement to explicitly type -i hosts on every command run.

host_key_checking = False ➡️ Disables SSH fingerprint prompts (Are you sure you want to continue connecting (yes/no)?), preventing execution hangs in automated workflows.
